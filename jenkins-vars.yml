---

# jenkins variables
project_name: docker-anycubicnext
ls_user: al3x1337
ls_repo: docker-anycubicnext
release_type: stable
release_tag: latest
ls_branch: master
external_artifact_check: |
  assets=$(curl -sX GET "https://api.github.com/repos/develonrails/anycubic-slicer-next/releases/latest" | jq -r '.assets[].browser_download_url')
  if grep -q "AppImage" <<< "${assets}"; then
    artifacts_found="true"
  else
    artifacts_found="false"
  fi
repo_vars:
  - EXT_USER = 'develonrails'
  - EXT_REPO = 'anycubic-slicer-next'
  - BUILD_VERSION_ARG = 'ANYCUBIC_SLICER_VERSION'
  - LS_USER = 'al3x1337'
  - LS_REPO = 'docker-anycubicnext'
  - CONTAINER_NAME = 'anycubicnext'
  - DOCKERHUB_IMAGE = 'al3x1337/anycubicnext'
  - DEV_DOCKERHUB_IMAGE = 'al3x1337/anycubicnext-dev'
  - PR_DOCKERHUB_IMAGE = 'al3x1337/anycubicnext-pr'
  - DIST_IMAGE = 'ubuntu'
  - MULTIARCH = 'false'
  - CI = 'true'
  - CI_WEB = 'true'
  - CI_PORT = '3001'
  - CI_SSL = 'true'
  - CI_DELAY = '120'
  - CI_DOCKERENV = 'TZ=US/Pacific'
  - CI_AUTH = 'user:password'
  - CI_WEBPATH = ''
